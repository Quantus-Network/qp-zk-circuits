---
name: Continuous Integration

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Principle of least privilege: all jobs only read the repo (checkout + cargo).
# Per-job override is unnecessary because no job pushes, creates releases or PRs.
permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  CARGO_NET_TIMEOUT: 60

jobs:
  fast-checks:
    name: 🏁 Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Run format checks
        run: |
          taplo format --check --config taplo.toml
          cargo +nightly fmt --all -- --check

  test-workspace:
    name: 🧪 Test Workspace
    # needs: fast-checks
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ubuntu
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/ubuntu
      - name: Setup macOS
        if: matrix.os == 'macos-latest'
        uses: ./.github/actions/macos
      - name: Test workspace (release, fast tests)
        run: |
          cargo test --workspace --locked --release --lib --bins -- --skip aggregator_tests --skip circuit_data_tests --skip prover_tests --skip verifier_tests
          cargo test --workspace --locked --release --doc

  analysis:
    name: 🤖 Analysis (Clippy & Doc)
    # needs: fast-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu
      - name: Run clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features --locked --release -- -D warnings
      - name: Check documentation
        run: cargo doc --workspace --locked --no-deps --all-features --document-private-items --release

  slow-tests:
    name: 🐌 Slow Tests (Crypto-heavy)
    # needs: fast-checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu
      - name: Build circuit binaries
        run: ./scripts/build-circuits.sh
      - name: Run slow crypto tests
        run: |
          cargo test --release -p tests -- aggregator_tests circuit_data_tests prover_tests verifier_tests
          cargo test --release --package qp-wormhole-aggregator

  security-audit:
    name: 🔐 Security Audit (non-blocking)
    needs: fast-checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo-audit binary
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-${{ runner.os }}-0.22.1
      - name: Cache RustSec advisory database
        uses: actions/cache@v5
        with:
          path: ~/.cargo/advisory-db
          key: cargo-advisory-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cargo-advisory-db-${{ runner.os }}-
      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked --version 0.22.1
          fi
      - name: Run cargo audit (informational only)
        # Only this step is non-blocking — every other step in this job
        # (checkout, caches, cargo-audit install) must fail loudly so we
        # don't silently skip the audit.
        continue-on-error: true
        run: cargo audit
